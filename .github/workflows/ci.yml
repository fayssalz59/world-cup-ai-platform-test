name: CI

on:
  push:
    branches:
      - main
      - feature/**
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Ruff lint
        run: ruff check .

      - name: Black format check
        run: black --check api ingestion ml orchestration transformation tests

      - name: Mypy type check
        run: mypy api ingestion ml orchestration transformation tests

      - name: Pytest
        run: pytest
