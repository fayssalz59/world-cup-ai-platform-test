name: Deploy API

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Docker image tag to build and deploy"
        required: true
        default: "latest"

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      IMAGE_NAME: world-cup-ai-platform-api

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to Azure Container Registry
        run: az acr login --name "${{ secrets.AZURE_CONTAINER_REGISTRY_NAME }}"

      - name: Build API image
        run: |
          docker build \
            -t "${{ secrets.AZURE_CONTAINER_REGISTRY_LOGIN_SERVER }}/${IMAGE_NAME}:${{ inputs.image_tag }}" \
            .

      - name: Push API image
        run: |
          docker push "${{ secrets.AZURE_CONTAINER_REGISTRY_LOGIN_SERVER }}/${IMAGE_NAME}:${{ inputs.image_tag }}"

      - name: Deploy Azure Container App
        run: |
          az containerapp update \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --name "${{ secrets.AZURE_CONTAINER_APP_NAME }}" \
            --image "${{ secrets.AZURE_CONTAINER_REGISTRY_LOGIN_SERVER }}/${IMAGE_NAME}:${{ inputs.image_tag }}"
